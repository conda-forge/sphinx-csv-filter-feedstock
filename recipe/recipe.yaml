# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.3"
  python_check_max: "3.14"

package:
  name: sphinx-csv-filter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sphinx-csv-filter/sphinx_csv_filter-${{ version }}.tar.gz
  sha256: 28e80a8768b3d47c94376ec0643191aa96ac646baf210fcf1c90be21f21c1f43

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}
    - setuptools <83
  run:
    - docutils <0.21
    - python >=${{ python_min }}
    - sphinx

tests:
  - python:
      imports: crate.sphinx.csv
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - tests/
    requirements:
      run:
        - pytest-cov
    script:
      - coverage run --source crate.sphinx.csv --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=100


about:
  summary: Sphinx CSV filter extension for Crate Documentation
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/sphinx-csv-filter
  repository: https://github.com/crate/sphinx_csv_filter

extra:
  recipe-maintainers:
    - bollwyvl
