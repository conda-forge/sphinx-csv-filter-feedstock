{% set version = "0.4.3" %}

package:
  name: sphinx-csv-filter
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sphinx-csv-filter/sphinx_csv_filter-{{ version }}.tar.gz
  sha256: 28e80a8768b3d47c94376ec0643191aa96ac646baf210fcf1c90be21f21c1f43

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - docutils <0.19
    - python >={{ python_min }}
    - sphinx

test:
  imports:
    - crate.sphinx.csv
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/crate/sphinx_csv_filter
  summary: Sphinx CSV filter extension for Crate Documentation
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bollwyvl
